services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-binance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-binance}
      POSTGRES_DB: ${POSTGRES_DB:-binance_assignment}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-binance} -d ${POSTGRES_DB:-binance_assignment}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-binance}:${POSTGRES_PASSWORD:-binance}@postgres:5432/${POSTGRES_DB:-binance_assignment}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SSE_URL: ${NEXT_PUBLIC_SSE_URL:-http://localhost:8000/api/dashboard/stream}
    depends_on:
      - backend
    env_file:
      - .env.example
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
